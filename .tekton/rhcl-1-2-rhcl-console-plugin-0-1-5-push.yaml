apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/rh-api-management/rhcl-console-plugin-product-build?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "rhcl-1.2"
  creationTimestamp:
  labels:
    appstudio.openshift.io/application: rhcl-1-2-rhcl-operator
    appstudio.openshift.io/component: rhcl-1-2-rhcl-console-plugin-0-1-5
    pipelines.appstudio.openshift.io/type: build
  name: rhcl-1-2-rhcl-console-plugin-0-1-5-on-push
  namespace: api-management-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/api-management-tenant/rhcl-1-2-rhcl-console-plugin-0-1-5:{{revision}}
  - name: dockerfile
    value: Containerfile.console-plugin-0.1.5
  - name: prefetch-input
    value: '[{"type": "rpm", "path": "."}, {"type": "npm", "path": "./yarn-install"}, {"type": "yarn", "path": "./console-plugin-0.1.5"}]'
  pipelineRef:
    name: build-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-rhcl-1-2-rhcl-console-plugin-0-1-5
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}