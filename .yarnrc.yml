# This instructs Yarn to fetch packages for x64, arm64, s390x, and ppc64 CPUs
# on Linux, which is the typical build environment for Konflux.
# Note: Yarn uses 'ppc64' (not 'ppc64le') to identify POWER architecture
supportedArchitectures:
  cpu:
    - x64
    - arm64
    - s390x
    - ppc64
  os:
    - linux

nodeLinker: node-modules
# Enable Corepack for version management
enableGlobalCache: true
